<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Assessment - Placement Readiness</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .assessment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: var(--space-24);
            margin-bottom: var(--space-24);
        }

        .timer {
            font-family: var(--font-heading);
            font-size: 28px;
            color: var(--accent-color);
            text-align: right;
        }

        .timer-label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #666;
            font-weight: 600;
        }

        .question-number {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: var(--space-16);
            color: #555;
        }

        .question-text {
            font-family: var(--font-heading);
            font-size: 24px;
            line-height: var(--heading-line-height, 1.3);
            margin-bottom: var(--space-40);
            max-width: 800px;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: var(--space-16);
            max-width: 600px;
        }

        .option-label {
            display: flex;
            align-items: center;
            gap: var(--space-16);
            padding: var(--space-16) var(--space-24);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            cursor: pointer;
            transition: border-color var(--transition), background-color var(--transition);
        }

        .option-label:hover {
            border-color: #aaa;
            background-color: #fafafa;
        }

        .option-label.selected {
            border-color: var(--accent-color);
            background-color: rgba(139, 0, 0, 0.02);
        }

        input[type="radio"] {
            accent-color: var(--accent-color);
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .code-block {
            background-color: #1e1e1e;
            color: #d4d4d4;
            padding: var(--space-24);
            border-radius: var(--radius);
            font-family: monospace;
            font-size: 14px;
            overflow-x: auto;
            margin-bottom: var(--space-40);
        }
    </style>
</head>

<body>

    <div class="app-container">
        <!-- Top Bar -->
        <header class="top-bar" style="background-color: var(--surface-color);">
            <div class="project-name">Data Structures Assessment</div>
            <div class="progress-indicator">Question 4 of 20</div>
            <div class="status-badge shipped" style="color: var(--warning-color); border-color: var(--warning-color);">
                In Progress</div>
        </header>

        <main class="main-content container" style="padding-top: var(--space-40);">

            <div class="card" style="border: none; padding: 0;">
                <div class="assessment-header">
                    <div>
                        <div class="question-number">Question 4</div>
                    </div>
                    <div>
                        <div class="timer-label">Time Remaining</div>
                        <div class="timer">14:52</div>
                    </div>
                </div>

                <div class="question-text">
                    What is the worst-case time complexity of inserting a node at the front of a Singly Linked List?
                </div>

                <!-- Optional Code Context -->
                <div class="code-block">
                    class Node {
                    int data;
                    Node next;
                    Node(int d) { data = d; next = null; }
                    }
                </div>

                <div class="options-list">
                    <label class="option-label">
                        <input type="radio" name="q4" value="A">
                        <span>O(n) - Linear Time</span>
                    </label>
                    <label class="option-label">
                        <input type="radio" name="q4" value="B">
                        <span>O(log n) - Logarithmic Time</span>
                    </label>
                    <label class="option-label selected">
                        <input type="radio" name="q4" value="C" checked>
                        <span>O(1) - Constant Time</span>
                    </label>
                    <label class="option-label">
                        <input type="radio" name="q4" value="D">
                        <span>O(n log n) - Linearithmic Time</span>
                    </label>
                </div>

                <div class="btn-group"
                    style="margin-top: var(--space-64); justify-content: space-between; max-width: 600px;">
                    <button class="btn btn-secondary" style="border-color: #ccc; color: #555;">Previous</button>
                    <button class="btn btn-primary">Save & Next</button>
                </div>
            </div>
        </main>

        <!-- Proof Footer -->
        <footer class="proof-footer">
            <div class="container">
                <div class="checklist" style="opacity: 0.5;">
                    <div class="check-item-group">
                        <div class="check-item">
                            <input type="checkbox" id="proof-ui" checked disabled>
                            <label for="proof-ui">UI Built</label>
                        </div>
                    </div>
                    <div class="check-item-group">
                        <div class="check-item">
                            <input type="checkbox" id="proof-logic" disabled>
                            <label for="proof-logic">Logic Working</label>
                        </div>
                    </div>
                    <div class="check-item-group">
                        <div class="check-item">
                            <input type="checkbox" id="proof-test" disabled>
                            <label for="proof-test">Test Passed</label>
                        </div>
                    </div>
                </div>
            </div>
        </footer>
    </div>

</body>

</html>
